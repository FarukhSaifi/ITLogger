version: 2
updates:
  # npm — up to 1 open PRs: one grouped minor/patch, one grouped major (7-day major cooldown).
  # Review requests: CODEOWNERS only (enable "Automatically request reviews from code owners" in repo settings).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    labels:
      - "dependencies"
    open-pull-requests-limit: 1
    versioning-strategy: increase
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 7
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      npm-major:
        patterns:
          - "*"
        update-types:
          - "major"
